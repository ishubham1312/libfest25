<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prize Distribution - LIBFEST 25</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@700;800;900&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        .logo-link {
            text-decoration: none;
            color: inherit;
        }

        .prize-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem 0;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('images/img1.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .prize-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .prize-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .prize-header h1 {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .prize-header p {
            font-size: 1.1rem;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .motivation-section {
            text-align: center;
            margin: 4rem 0;
        }

        .motivation-section h2 {
            font-size: 4rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin: 0;
        }

        .motivation-section h2 span {
            display: block;
            font-size: 2.5rem;
            margin-top: 1rem;
            color: #009FFD;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        footer {
            margin-top: auto;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <a href="index.html" class="logo-link">LIBFEST<span class="year">'25</span></a>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html#schedule">Schedule</a>
            <a href="index.html#games">Games</a>
            <a href="index.html#memories">Memories</a>
            <a href="index.html#alumni">Alumni</a>
            <a href="index.html#faculty">Faculty</a>
            <a href="index.html#contact">Contact</a>
        </div>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <section class="prize-section">
        <div class="prize-container">
            <div class="prize-header">
                <h1>Prize Distribution</h1>
                <p>Join us for the grand prize distribution ceremony where we celebrate the achievements of our participants</p>
            </div>

            <div class="motivation-section">
                <h2>Khelbo</h2>
                <h2>Ladbo</h2>
                <h2><span>Jeetbo</span></h2>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <p><center>Organised by:</center></p>
            <p>Department of Library and Information Science, BHU</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
